<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="680"
   viewBox="0 0 680 600"
   font-family="ui-sans-serif, system-ui, sans-serif"
   version="1.1"
   id="svg24"
   sodipodi:docname="kyuix-attestation-flow.svg"
   inkscape:version="1.3.2 (091e20e, 2023-11-25, custom)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview24"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1.0"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="3.095"
     inkscape:cx="340.06462"
     inkscape:cy="306.46204"
     inkscape:window-width="3840"
     inkscape:window-height="2071"
     inkscape:window-x="-9"
     inkscape:window-y="-9"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg24" />
  <defs
     id="defs1">
    <marker
       id="arrow"
       viewBox="0 0 10 10"
       refX="8"
       refY="5"
       markerWidth="6"
       markerHeight="6"
       orient="auto-start-reverse">
      <path
         d="M2 1L8 5L2 9"
         fill="none"
         stroke="context-stroke"
         stroke-width="1.5"
         stroke-linecap="round"
         stroke-linejoin="round"
         id="path1" />
    </marker>
  </defs>
  <!-- Background -->
  <rect
     width="680"
     height="600"
     fill="#ffffff"
     id="rect1" />
  <!-- Participant headers -->
  <rect
     x="40"
     y="20"
     width="120"
     height="44"
     rx="8"
     fill="#EEEDFE"
     stroke="#534AB7"
     stroke-width="0.5"
     id="rect2" />
  <text
     font-size="14px"
     font-weight="500"
     fill="#3c3489"
     x="100"
     y="43.040806"
     text-anchor="middle"
     dominant-baseline="central"
     id="text2">Consumer</text>
  <rect
     x="280"
     y="20"
     width="120"
     height="44"
     rx="8"
     fill="#E1F5EE"
     stroke="#0F6E56"
     stroke-width="0.5"
     id="rect3" />
  <text
     font-size="14px"
     font-weight="500"
     fill="#085041"
     x="340"
     y="42.958775"
     text-anchor="middle"
     dominant-baseline="central"
     id="text3">User</text>
  <rect
     x="520"
     y="20"
     width="120"
     height="44"
     rx="8"
     fill="#FAECE7"
     stroke="#993C1D"
     stroke-width="0.5"
     id="rect4" />
  <text
     font-size="14px"
     font-weight="500"
     fill="#712b13"
     x="580"
     y="43.239048"
     text-anchor="middle"
     dominant-baseline="central"
     id="text4">Provider</text>
  <!-- Lifelines -->
  <line
     x1="100"
     y1="64"
     x2="100"
     y2="548"
     stroke="#b4b2a9"
     stroke-width="1"
     stroke-dasharray="4 4"
     id="line4" />
  <line
     x1="340"
     y1="64"
     x2="340"
     y2="548"
     stroke="#b4b2a9"
     stroke-width="1"
     stroke-dasharray="4 4"
     id="line5" />
  <line
     x1="580"
     y1="64"
     x2="580"
     y2="548"
     stroke="#b4b2a9"
     stroke-width="1"
     stroke-dasharray="4 4"
     id="line6" />
  <!-- Step 1: Consumer generates request -->
  <rect
     x="50"
     y="88"
     width="100"
     height="36"
     rx="6"
     fill="#f1efe8"
     stroke="#d3d1c7"
     stroke-width="0.5"
     id="rect6" />
  <text
     font-size="11"
     fill="#444441"
     x="100"
     y="102"
     text-anchor="middle"
     dominant-baseline="central"
     id="text6">Generate request</text>
  <text
     font-size="11"
     fill="#444441"
     x="100"
     y="116"
     text-anchor="middle"
     dominant-baseline="central"
     id="text7">+ nonce</text>
  <!-- Step 2: Send request string to User -->
  <line
     x1="100"
     y1="140"
     x2="328"
     y2="140"
     stroke="#5F5E5A"
     stroke-width="1.2"
     marker-end="url(#arrow)"
     id="line7" />
  <text
     font-size="11"
     fill="#5F5E5A"
     x="214"
     y="133"
     text-anchor="middle"
     id="text8">Request string (copy/paste)</text>
  <!-- Step 3: User pastes into Provider -->
  <line
     x1="340"
     y1="156.56447"
     x2="568"
     y2="156.56447"
     stroke="#5f5e5a"
     stroke-width="1.2"
     marker-end="url(#arrow)"
     id="line8" />
  <text
     font-size="11px"
     fill="#5f5e5a"
     x="454"
     y="149.56447"
     text-anchor="middle"
     id="text9">Paste into provider page</text>
  <!-- Step 4: Provider shows user what's being asked -->
  <rect
     x="492.42133"
     y="165.42294"
     width="175.88242"
     height="54.961037"
     rx="5.9959912"
     fill="#f1efe8"
     stroke="#d3d1c7"
     stroke-width="0.617591"
     id="rect9" />
  <text
     font-size="11px"
     fill="#444441"
     x="580"
     y="179.36415"
     text-anchor="middle"
     dominant-baseline="central"
     id="text10">Parse request</text>
  <text
     font-size="11px"
     fill="#444441"
     x="579.27441"
     y="194.12636"
     text-anchor="middle"
     dominant-baseline="central"
     id="text10-6">Check query</text>
  <text
     font-size="11px"
     fill="#444441"
     x="580"
     y="208.94766"
     text-anchor="middle"
     dominant-baseline="central"
     id="text11">Show query to user</text>
  <line
     x1="568"
     y1="243.58351"
     x2="352"
     y2="243.58351"
     stroke="#5f5e5a"
     stroke-width="1.2"
     marker-end="url(#arrow)"
     id="line11" />
  <text
     font-size="11px"
     fill="#5f5e5a"
     x="460"
     y="236.58351"
     text-anchor="middle"
     id="text12">&quot;Is user born before [date]?&quot;</text>
  <!-- Step 5: User reviews and consents -->
  <rect
     x="272"
     y="255.58351"
     width="136"
     height="32"
     rx="6"
     fill="#f1efe8"
     stroke="#d3d1c7"
     stroke-width="0.5"
     id="rect12" />
  <text
     font-size="11px"
     fill="#444441"
     x="340"
     y="271.58353"
     text-anchor="middle"
     dominant-baseline="central"
     id="text13">Review &amp; click OK</text>
  <!-- Step 6: User consent triggers provider to check + sign -->
  <line
     x1="352"
     y1="301.58353"
     x2="568"
     y2="301.58353"
     stroke="#5f5e5a"
     stroke-width="1.2"
     marker-end="url(#arrow)"
     id="line13" />
  <text
     font-size="11px"
     fill="#5f5e5a"
     x="460"
     y="294.58353"
     text-anchor="middle"
     id="text14">User consent</text>
  <rect
     x="492"
     y="313.10751"
     width="176"
     height="32.892494"
     rx="6"
     fill="#f1efe8"
     stroke="#d3d1c7"
     stroke-width="0.413902"
     id="rect14" />
  <text
     font-size="11"
     fill="#444441"
     x="580"
     y="330"
     text-anchor="middle"
     dominant-baseline="central"
     id="text16">Sign {nonce + result}</text>
  <!-- Step 7: Provider returns signed response -->
  <line
     x1="568"
     y1="365.87784"
     x2="352"
     y2="365.87784"
     stroke="#5f5e5a"
     stroke-width="1.2"
     marker-end="url(#arrow)"
     id="line16" />
  <text
     font-size="11px"
     fill="#5f5e5a"
     x="460"
     y="358.87784"
     text-anchor="middle"
     id="text17">Signed response string</text>
  <!-- Step 8: User pastes back -->
  <line
     x1="328"
     y1="384"
     x2="112"
     y2="384"
     stroke="#5F5E5A"
     stroke-width="1.2"
     marker-end="url(#arrow)"
     id="line17" />
  <text
     font-size="11"
     fill="#5F5E5A"
     x="220"
     y="377"
     text-anchor="middle"
     id="text18">Paste response (copy/paste)</text>
  <!-- Step 9: Consumer validates -->
  <rect
     x="40"
     y="396"
     width="120"
     height="48"
     rx="6"
     fill="#f1efe8"
     stroke="#d3d1c7"
     stroke-width="0.5"
     id="rect18" />
  <text
     font-size="11"
     fill="#444441"
     x="100"
     y="412"
     text-anchor="middle"
     dominant-baseline="central"
     id="text19">Fetch provider pubkey</text>
  <text
     font-size="11"
     fill="#444441"
     x="100"
     y="428"
     text-anchor="middle"
     dominant-baseline="central"
     id="text20">via DNS TXT record</text>
  <rect
     x="40"
     y="456"
     width="120"
     height="48"
     rx="6"
     fill="#f1efe8"
     stroke="#d3d1c7"
     stroke-width="0.5"
     id="rect20" />
  <text
     font-size="11"
     fill="#444441"
     x="100"
     y="472"
     text-anchor="middle"
     dominant-baseline="central"
     id="text21">Verify signature</text>
  <text
     font-size="11"
     fill="#444441"
     x="100"
     y="488"
     text-anchor="middle"
     dominant-baseline="central"
     id="text22">+ nonce match</text>
  <!-- Final result -->
  <rect
     x="40"
     y="516"
     width="120"
     height="36"
     rx="8"
     fill="#E1F5EE"
     stroke="#0F6E56"
     stroke-width="0.5"
     id="rect22" />
  <text
     font-size="14"
     font-weight="500"
     fill="#085041"
     x="100"
     y="534"
     text-anchor="middle"
     dominant-baseline="central"
     id="text23">✓ Access granted</text>
  <!-- Minimal disclosure footer -->
  <rect
     x="40"
     y="563"
     width="600"
     height="28"
     rx="4"
     fill="#f1efe8"
     stroke="#d3d1c7"
     stroke-width="0.5"
     id="rect23" />
  <text
     font-size="11"
     fill="#5F5E5A"
     x="340"
     y="577"
     text-anchor="middle"
     dominant-baseline="central"
     id="text24">Provider learns: query type + date only · Consumer learns: attester identity + true/false only</text>
</svg>
