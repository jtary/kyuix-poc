services:
  identity-consumer:
    build:
      context: ${COMPOSE_BUILD_CONTEXT:-.}
      dockerfile: apps/identity-consumer/Dockerfile
    ports:
      - "3000:3000"
    environment:
      CONSUMER_DOMAIN: ${CONSUMER_DOMAIN:-consumer.localtest.me}
    restart: unless-stopped

  identity-provider:
    build:
      context: ${COMPOSE_BUILD_CONTEXT:-.}
      dockerfile: apps/identity-provider/Dockerfile
    ports:
      - "3001:3001"
    environment:
      APP_DOMAIN: ${PROVIDER_DOMAIN:-provider.example.com}
      PROVIDER_DOMAIN: ${PROVIDER_DOMAIN:-provider.example.com}
      PROVIDER_PRIVATE_KEY_PKCS8_BASE64: ${PROVIDER_PRIVATE_KEY_PKCS8_BASE64:-}
      DEMO_SUBJECT_DOB: ${DEMO_SUBJECT_DOB:-1998-04-12}
    restart: unless-stopped
